name = "claude-faqs-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Route pattern: handles api.kcodes.me/claude-faqs/* while c-lion-api handles everything else
routes = [{ pattern = "api.kcodes.me/claude-faqs/*", zone_name = "kcodes.me" }]

# Cloudflare Workers AI
[ai]
binding = "AI"

# Import JSON files
rules = [
  { type = "Data", globs = ["**/*.json"], fallthrough = true }
]

[[kv_namespaces]]
binding = "RATE_LIMITS"
id = "53d068af6c1c4727aa11be06b2af5913"

[[kv_namespaces]]
binding = "FAQ_API_KEYS"
id = "9659567c5d1b4e658eaa367878e33064"

[[kv_namespaces]]
binding = "FAQ_EMBEDDINGS"
id = "254a1e734fa449beacff382ef26a1e3c"
