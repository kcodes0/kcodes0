name = "kona-news"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "kona-news-db"
database_id = "PLACEHOLDER_RUN_npm_run_db:create"

# Custom domain: news.kcodes.me
# Configure in Cloudflare dashboard after deployment

# Routes protected by Cloudflare Access:
# /admin/* - main admin area
# /e/* - edit routes
# /api/articles - admin API endpoints
# /api/contacts/* - admin contact management
